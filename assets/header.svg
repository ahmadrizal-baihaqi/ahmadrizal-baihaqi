<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Sleek Teal-Blue Gradient (avoiding purple/violet) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a192f" />
      <stop offset="50%" stop-color="#0d2b45" />
      <stop offset="100%" stop-color="#112233" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#64ffda" />
      <stop offset="100%" stop-color="#00b4d8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background with slight border-radius -->
  <rect width="800" height="200" rx="16" fill="url(#bg-grad)" stroke="#172a45" stroke-width="2" />
  
  <!-- Subtle Background Grid/Lines for tech aesthetic -->
  <g opacity="0.05">
    <line x1="0" y1="40" x2="800" y2="40" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="80" x2="800" y2="80" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="120" x2="800" y2="120" stroke="#fff" stroke-width="1" />
    <line x1="0" y1="160" x2="800" y2="160" stroke="#fff" stroke-width="1" />
    <line x1="100" y1="0" x2="100" y2="200" stroke="#fff" stroke-width="1" />
    <line x1="200" y1="0" x2="200" y2="200" stroke="#fff" stroke-width="1" />
    <line x1="300" y1="0" x2="300" y2="200" stroke="#fff" stroke-width="1" />
    <line x1="400" y1="0" x2="400" y2="200" stroke="#fff" stroke-width="1" />
    <line x1="500" y1="0" x2="500" y2="200" stroke="#fff" stroke-width="1" />
    <line x1="600" y1="0" x2="600" y2="200" stroke="#fff" stroke-width="1" />
    <line x1="700" y1="0" x2="700" y2="200" stroke="#fff" stroke-width="1" />
  </g>
  
  <!-- Decorative Abstract Shape (sleek circles/orbits) -->
  <g opacity="0.1" transform="translate(680, 100)">
    <circle r="60" fill="none" stroke="#64ffda" stroke-width="1.5" />
    <circle r="40" fill="none" stroke="#00b4d8" stroke-width="1" stroke-dasharray="5 5" />
    <circle r="20" fill="none" stroke="#64ffda" stroke-width="2" />
  </g>
  
  <!-- Decorative Bracket Icon on the left -->
  <g transform="translate(50, 75)" opacity="0.2">
    <path d="M 0 0 L -15 25 L 0 50" fill="none" stroke="#64ffda" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 30 0 L 45 25 L 30 50" fill="none" stroke="#64ffda" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <line x1="20" y1="5" x2="10" y2="45" stroke="#00b4d8" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Title Text -->
  <text x="120" y="90" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="36" fill="url(#text-grad)" letter-spacing="1">
    Ahmad Rizal Baihaqi
  </text>
  
  <!-- Nickname Text / Accent -->
  <text x="120" y="125" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="500" font-size="16" fill="#8892b0" letter-spacing="3">
    RIZAL // JELL
  </text>
  
  <!-- Subtitle Text -->
  <rect x="120" y="145" width="235" height="26" rx="6" fill="#172a45" opacity="0.8" />
  <text x="130" y="162" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="12" fill="#64ffda" letter-spacing="1">
    Fullstack Developer Enthusiast
  </text>

  <!-- Glowing accent dot -->
  <circle cx="720" cy="50" r="4" fill="#64ffda" filter="url(#glow)" />
</svg>
