<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .icon-wave {
      animation: wave 1.8s ease-in-out infinite;
      animation-delay: 0.39s;
      transform-box: fill-box;
      transform-origin: center;
    }
    .icon-container {
      transition: transform 0.2s ease-in-out;
    }
    .icon-container:hover {
      transform: scale(1.1);
      transform-origin: center;
    }
  </style>
  <g class="icon-wave">
    <g class="icon-container">
      <!-- Outer glowing border -->
      <rect x="2" y="2" width="44" height="44" rx="12" fill="none" stroke="#ffffff" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
      <!-- Sharp outer border -->
      <rect x="2" y="2" width="44" height="44" rx="12" fill="none" stroke="#ffffff" stroke-width="1.5"/>
      <!-- Inner icon -->
      <svg x="12" y="12" width="24" height="24" viewBox="0 0 128 128" overflow="visible">
        <circle cx="64" cy="64" r="64"/><path fill="url(#a)" d="M106.317 112.014 49.167 38.4H38.4v51.179h8.614v-40.24l52.54 67.884a64.216 64.216 0 0 0 6.763-5.209z"/><path fill="url(#b)" d="M81.778 38.4h8.533v51.2h-8.533z"/><defs><linearGradient id="a" x1="109" x2="144.5" y1="116.5" y2="160.5" gradientTransform="scale(.71111)" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient><linearGradient id="b" x1="121" x2="120.799" y1="54" y2="106.875" gradientTransform="scale(.71111)" gradientUnits="userSpaceOnUse"><stop stop-color="#fff"/><stop offset="1" stop-color="#fff" stop-opacity="0"/></linearGradient></defs>

<style>path { fill: #ffffff !important; }</style>
      </svg>
    </g>
  </g>
</svg>
