<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes wave {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .icon-wave {
      animation: wave 1.8s ease-in-out infinite;
      animation-delay: 1.10s;
      transform-box: fill-box;
      transform-origin: center;
    }
    .icon-container {
      transition: transform 0.2s ease-in-out;
    }
    .icon-container:hover {
      transform: scale(1.1);
      transform-origin: center;
    }
  </style>
  <g class="icon-wave">
    <g class="icon-container">
      <!-- Outer glowing border -->
      <rect x="2" y="2" width="44" height="44" rx="12" fill="none" stroke="#2D3748" stroke-width="1.5" filter="url(#glow)" opacity="0.6"/>
      <!-- Sharp outer border -->
      <rect x="2" y="2" width="44" height="44" rx="12" fill="none" stroke="#2D3748" stroke-width="1.5"/>
      <!-- Inner icon -->
      <svg x="12" y="12" width="24" height="24" viewBox="0 0 128 128" overflow="visible">
        <path fill="#2d3748" d="M66.457.014a6.308 6.308 0 0 0-5.812 3.028l-47.87 78.072a6.379 6.379 0 0 0 .048 6.748l23.568 37.186a6.387 6.387 0 0 0 7.22 2.683l68.012-20.407a6.37 6.37 0 0 0 3.96-8.765l-43.72-94.85A6.298 6.298 0 0 0 66.46.014Zm1.795 23.95a2.348 2.348 0 0 1 2.448 1.433l30.16 69.784a2.39 2.39 0 0 1-1.512 3.241l-46.996 14.024a2.39 2.39 0 0 1-3.024-2.76l16.83-83.812a2.353 2.353 0 0 1 2.099-1.91z"/>
      </svg>
    </g>
  </g>
</svg>
