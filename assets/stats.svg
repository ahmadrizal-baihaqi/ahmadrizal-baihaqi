<svg width="900" height="380" viewBox="0 0 900 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%">
      <stop offset="0%"  stop-color="#0a0e27" stop-opacity="1"/>
      <stop offset="55%" stop-color="#02030f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Strong glow -->
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Sphere gradient -->
    <radialGradient id="sphereGrad" cx="38%" cy="38%">
      <stop offset="0%"  stop-color="#00C9A7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#00C9A7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a3d34"  stop-opacity="0.9"/>
    </radialGradient>

    <!-- Beam gradients (left→center) -->
    <linearGradient id="beamL1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00C9A7" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="beamL2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00C9A7" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Beam gradients (right→center) -->
    <linearGradient id="beamR1" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00C9A7" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="beamR2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00C9A7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00C9A7" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Panel gradient -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#00C9A7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a0e27" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Orbit animation -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes rotate-orbit {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes blink {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 0.9; }
      }
      .sphere-pulse { animation: pulse 3s ease-in-out infinite; }
      .orbit { transform-origin: 450px 190px; animation: rotate-orbit 8s linear infinite; }
      .orbit-2 { transform-origin: 450px 190px; animation: rotate-orbit 12s linear infinite reverse; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="380" rx="18" fill="url(#bgGrad)"/>

  <!-- Stars -->
  <g opacity="0.7">
    <circle cx="42"  cy="28"  r="1"   fill="#fff" style="animation:blink 2.1s ease-in-out infinite"/>
    <circle cx="130" cy="60"  r="0.8" fill="#fff" style="animation:blink 3.4s ease-in-out infinite"/>
    <circle cx="200" cy="20"  r="1.2" fill="#00C9A7" style="animation:blink 2.8s ease-in-out infinite"/>
    <circle cx="310" cy="45"  r="0.7" fill="#fff" style="animation:blink 1.9s ease-in-out infinite"/>
    <circle cx="80"  cy="130" r="0.9" fill="#fff" style="animation:blink 3.1s ease-in-out infinite"/>
    <circle cx="170" cy="160" r="1.1" fill="#00C9A7" style="animation:blink 2.5s ease-in-out infinite"/>
    <circle cx="60"  cy="250" r="0.8" fill="#fff" style="animation:blink 4.0s ease-in-out infinite"/>
    <circle cx="160" cy="300" r="1"   fill="#fff" style="animation:blink 2.3s ease-in-out infinite"/>
    <circle cx="250" cy="340" r="0.7" fill="#00C9A7" style="animation:blink 3.6s ease-in-out infinite"/>
    <circle cx="350" cy="355" r="1.2" fill="#fff" style="animation:blink 1.7s ease-in-out infinite"/>
    <circle cx="650" cy="28"  r="1"   fill="#fff" style="animation:blink 2.9s ease-in-out infinite"/>
    <circle cx="720" cy="55"  r="0.8" fill="#00C9A7" style="animation:blink 2.2s ease-in-out infinite"/>
    <circle cx="820" cy="30"  r="1.2" fill="#fff" style="animation:blink 3.3s ease-in-out infinite"/>
    <circle cx="860" cy="110" r="0.9" fill="#fff" style="animation:blink 1.8s ease-in-out infinite"/>
    <circle cx="780" cy="140" r="1"   fill="#00C9A7" style="animation:blink 3.7s ease-in-out infinite"/>
    <circle cx="840" cy="220" r="0.7" fill="#fff" style="animation:blink 2.6s ease-in-out infinite"/>
    <circle cx="750" cy="300" r="1.1" fill="#fff" style="animation:blink 3.0s ease-in-out infinite"/>
    <circle cx="820" cy="340" r="0.8" fill="#00C9A7" style="animation:blink 2.4s ease-in-out infinite"/>
    <circle cx="680" cy="360" r="1"   fill="#fff" style="animation:blink 3.9s ease-in-out infinite"/>
    <circle cx="560" cy="25"  r="0.8" fill="#fff" style="animation:blink 2.0s ease-in-out infinite"/>
    <circle cx="450" cy="15"  r="1"   fill="#00C9A7" style="animation:blink 4.2s ease-in-out infinite"/>
    <circle cx="450" cy="365" r="0.9" fill="#fff" style="animation:blink 2.7s ease-in-out infinite"/>
  </g>

  <!-- Left beam lines -->
  <rect x="0"   y="165" width="360" height="2" rx="1" fill="url(#beamL1)"/>
  <rect x="0"   y="180" width="340" height="1" rx="1" fill="url(#beamL2)" opacity="0.6"/>
  <rect x="0"   y="195" width="350" height="1.5" rx="1" fill="url(#beamL2)" opacity="0.5"/>
  <rect x="0"   y="210" width="330" height="1" rx="1" fill="url(#beamL2)" opacity="0.4"/>
  <rect x="0"   y="225" width="360" height="2" rx="1" fill="url(#beamL1)" opacity="0.7"/>

  <!-- Right beam lines -->
  <rect x="540" y="165" width="360" height="2" rx="1" fill="url(#beamR1)"/>
  <rect x="560" y="180" width="340" height="1" rx="1" fill="url(#beamR2)" opacity="0.6"/>
  <rect x="550" y="195" width="350" height="1.5" rx="1" fill="url(#beamR2)" opacity="0.5"/>
  <rect x="570" y="210" width="330" height="1" rx="1" fill="url(#beamR2)" opacity="0.4"/>
  <rect x="540" y="225" width="360" height="2" rx="1" fill="url(#beamR1)" opacity="0.7"/>

  <!-- Orbit rings -->
  <g class="orbit">
    <ellipse cx="450" cy="190" rx="90" ry="32" stroke="#00C9A7" stroke-width="0.6" stroke-opacity="0.25" fill="none"/>
    <circle cx="540" cy="190" r="3.5" fill="#00C9A7" filter="url(#glow)" opacity="0.9"/>
  </g>
  <g class="orbit-2">
    <ellipse cx="450" cy="190" rx="75" ry="25" stroke="#00C9A7" stroke-width="0.5" stroke-opacity="0.18" fill="none" stroke-dasharray="4 6"/>
    <circle cx="375" cy="190" r="2.5" fill="#ffffff" filter="url(#glow)" opacity="0.7"/>
  </g>

  <!-- Center sphere -->
  <circle cx="450" cy="190" r="62" fill="#000814" opacity="0.7"/>
  <circle cx="450" cy="190" r="58" fill="url(#sphereGrad)" filter="url(#strongGlow)" class="sphere-pulse"/>
  <circle cx="450" cy="190" r="58" fill="none" stroke="#00C9A7" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="430" cy="172" r="16" fill="#ffffff" fill-opacity="0.04"/>

  <!-- Profile text in sphere -->
  <text x="450" y="183" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle" opacity="0.9">@ahmadrizal</text>
  <text x="450" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#00C9A7" text-anchor="middle" opacity="0.85">-baihaqi</text>
  <text x="450" y="216" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" fill="#8892b0" text-anchor="middle">Fullstack Dev</text>

  <!-- ===== LEFT PANEL ===== -->
  <rect x="20" y="70" width="270" height="240" rx="12" fill="url(#panelGrad)" stroke="#00C9A7" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Panel header -->
  <text x="155" y="102" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#00C9A7" text-anchor="middle" letter-spacing="2" opacity="0.9">CONTRIBUTIONS</text>
  <line x1="40" y1="112" x2="270" y2="112" stroke="#00C9A7" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Stat 1: Total Commits -->
  <text x="155" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">250+</text>
  <text x="155" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle" letter-spacing="1.5">TOTAL COMMITS</text>

  <line x1="55" y1="185" x2="255" y2="185" stroke="#00C9A7" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Stat 2: Pull Requests -->
  <text x="95"  y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">12</text>
  <text x="95"  y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle" letter-spacing="1">PULL REQUESTS</text>

  <line x1="155" y1="200" x2="155" y2="250" stroke="#00C9A7" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Stat 3: Issues -->
  <text x="215" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">8</text>
  <text x="215" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle" letter-spacing="1">ISSUES OPENED</text>

  <line x1="55" y1="255" x2="255" y2="255" stroke="#00C9A7" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Stat 4: Repositories -->
  <text x="155" y="288" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#00C9A7" text-anchor="middle" filter="url(#glow)">10</text>
  <text x="155" y="305" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle" letter-spacing="1">REPOSITORIES</text>

  <!-- ===== RIGHT PANEL ===== -->
  <rect x="610" y="70" width="270" height="240" rx="12" fill="url(#panelGrad)" stroke="#00C9A7" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Panel header -->
  <text x="745" y="102" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#00C9A7" text-anchor="middle" letter-spacing="2" opacity="0.9">GITHUB PROFILE</text>
  <line x1="630" y1="112" x2="860" y2="112" stroke="#00C9A7" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Stat 1: Stars Earned -->
  <text x="745" y="148" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">5+</text>
  <text x="745" y="168" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8892b0" text-anchor="middle" letter-spacing="1.5">STARS EARNED</text>

  <line x1="645" y1="185" x2="845" y2="185" stroke="#00C9A7" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Stat 2: Followers -->
  <text x="685" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">7</text>
  <text x="685" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle" letter-spacing="1">FOLLOWERS</text>

  <line x1="745" y1="200" x2="745" y2="250" stroke="#00C9A7" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Stat 3: Following -->
  <text x="805" y="220" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff" text-anchor="middle" filter="url(#glow)">15</text>
  <text x="805" y="237" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle" letter-spacing="1">FOLLOWING</text>

  <line x1="645" y1="255" x2="845" y2="255" stroke="#00C9A7" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Stat 4: Top Language -->
  <text x="745" y="286" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#00C9A7" text-anchor="middle" filter="url(#glow)">JavaScript</text>
  <text x="745" y="305" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8892b0" text-anchor="middle" letter-spacing="1">TOP LANGUAGE</text>

  <!-- Bottom label -->
  <text x="450" y="360" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#3a4a6a" text-anchor="middle" letter-spacing="2">AHMADRIZAL-BAIHAQI · GITHUB STATS</text>
</svg>
